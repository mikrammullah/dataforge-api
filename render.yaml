services:
  - type: web
    name: dataforge-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WALLET_ADDRESS
        sync: false
      - key: PRICE_USDC
        value: "0.001"
      - key: NETWORK
        value: base-sepolia
      - key: X402_FACILITATOR
        value: https://x402.org/facilitator
      - key: PYTHON_VERSION
        value: "3.12"
    autoDeploy: true
